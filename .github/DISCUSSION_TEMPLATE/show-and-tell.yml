title: Show and tell
labels:
  - show-and-tell
body:
  - type: markdown
    attributes:
      value: |
        Share your setup — gaming room, homelab rack, office, HVAC experiment, or a screenshot of HeatLens in action.
  - type: textarea
    id: setup
    attributes:
      label: Your setup
      description: PC specs, room size, ambient temps, or why room heat matters to you.
    validations:
      required: true
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot or notes (optional)
      description: Drag and drop an image into the comment after posting, or paste a link.
